name: drift_db_inspector
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.4

dependencies:
  desktop_drop: ^0.7.0
  file_picker: ^8.3.2
  flutter:
    sdk: flutter
  flutter_animate: ^4.5.2
  flutter_hooks: ^0.21.3+1
  flutter_popup: ^3.3.9
  hooks_riverpod: ^3.3.1
  hugeicons: ^1.1.6
  macos_window_utils: ^1.9.1
  path: ^1.9.1
  path_provider: ^2.1.5
  shared_preferences: ^2.5.5
  sqlite3: ^3.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  fonts:
    - family: Plus Jakarta Sans
      fonts:
        - asset: "assets/fonts/PlusJakartaSans[wght].ttf"
        - asset: "assets/fonts/PlusJakartaSans-Italic[wght].ttf"
          style: italic
